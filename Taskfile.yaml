---

version: '3'

tasks:
  build:
    desc: Build the deep-analysis binary
    cmds:
      - mkdir -p dist
      - go build -o dist/deep-analysis .

  test:
    desc: Run tests
    cmds:
      - go test -v ./...

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run

  tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf dist/ bin/

  run:
    desc: Run deep-analysis on a markdown document
    deps: [build]
    cmds:
      - |
        if [ -z "${OPENAI_API_KEY}" ]; then
          echo "Error: OPENAI_API_KEY environment variable is required"
          exit 1
        fi
        if [ -z "{{.INPUT}}" ]; then
          echo "Usage: task run INPUT=<file> [OUTPUT=<file>]"
          exit 1
        fi
        {{if .OUTPUT}}
        ./dist/deep-analysis --input {{.INPUT}} --output {{.OUTPUT}}
        {{else}}
        ./dist/deep-analysis --input {{.INPUT}}
        {{end}}
