[tools]
go = "1.25.3"

[tasks.build]
description = "Build the deep-analysis binary"
run = """
mkdir -p dist
go build -o dist/deep-analysis .
"""

[tasks.test]
description = "Run tests"
run = "go test -v ./..."

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run"
tools = { "aqua:golangci/golangci-lint" = "2.5.0" }

[tasks.tidy]
description = "Tidy go modules"
run = "go mod tidy"

[tasks.clean]
description = "Clean build artifacts"
run = "rm -rf dist/"

[tasks.run]
description = "Run deep-analysis on a markdown document"
depends = ["build"]
usage = '''
arg "<input>" env="INPUT" help="Input markdown file"
arg "[output]" env="OUTPUT" help="Optional output markdown file"
'''
run = '''
[ -n "${OPENAI_API_KEY:-}" ] || {
  echo "Error: OPENAI_API_KEY environment variable is required" >&2
  exit 1
}

if [ -n "${usage_output:-}" ]; then
  exec ./dist/deep-analysis --input "${usage_input?}" --output "${usage_output}"
fi

exec ./dist/deep-analysis --input "${usage_input?}"
'''
